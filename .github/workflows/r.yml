name: r

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/r.yml'
      - 'rust/**'
      - 'c/**'
      - 'r/**'
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Run air format
      - run: curl -LsSf https://github.com/posit-dev/air/releases/latest/download/air-installer.sh | sh
      - run: cd r/sedonadb && air format . --check
      - run: cd r/sedonafns && air format . --check

  test:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Use stable Rust
        if: matrix.config.os != 'windows-latest'
        run: |
          rustup toolchain install stable --no-self-update
          rustup default stable

      # Set the default toolchain here so that rust-cache saves/restores
      # the correct target. (The R package will use this target regardless,
      # this just in theory helps the cache)
      - name: Use stable Rust (windows)
        if: matrix.config.os == 'windows-latest'
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --no-self-update
          rustup default stable-x86_64-pc-windows-gnu

      - name: Enable Long Paths support (Windows)
        if: matrix.config.os == 'windows-latest'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Install dependencies (Linux)
        if: matrix.config.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgeos-dev

      - name: Install dependencies (MacOS)
        if: matrix.config.os == 'macos-latest'
        run: brew install geos

      # Dynamically set a short target directory on Windows to bypass 260-char MinGW limits,
      # while keeping paths standard on Mac/Linux.
      - name: Configure Target Directory
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "SEDONADB_TARGET_DIR=D:/a/t" >> $GITHUB_ENV
            echo "CACHE_WORKSPACE=. -> D:/a/t" >> $GITHUB_ENV
          else
            echo "SEDONADB_TARGET_DIR=$(pwd)/r/sedonadb/src/rust/target" >> $GITHUB_ENV
            echo "CACHE_WORKSPACE=. -> r/sedonadb/src/rust/target" >> $GITHUB_ENV
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "r-v4"
          workspaces: ${{ env.CACHE_WORKSPACE }}
          cache-bin: false

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: any::glue, any::here, any::rlang, any::yaml, any::roxygen2, any::rcmdcheck
          working-directory: r/sedonadb
          cache: false

      - name: Install sedonadb R Package
        run: |
          R CMD INSTALL r/sedonadb --preclean

      - name: Test sedonadb R Package
        run: |
          R -e 'library(testthat); test_local("r/sedonadb", MultiReporter$new(list(CheckReporter$new(), LocationReporter$new())))'

      - name: Install sedonafns R Package
        run: |
          R CMD INSTALL r/sedonafns --preclean

      - name: Test sedonafns R Package
        run: |
          R -e 'library(testthat); test_local("r/sedonafns", MultiReporter$new(list(CheckReporter$new(), LocationReporter$new())))'

      - name: Install sdplyr R Package
        run: |
          R CMD INSTALL r/sdplyr --preclean

      - name: Test sdplyr R Package
        run: |
          R -e 'library(testthat); test_local("r/sdplyr", MultiReporter$new(list(CheckReporter$new(), LocationReporter$new())))'

      # These two packages are quick to CMD check after sedonadb is installed,
      # so do that here
      - uses: r-lib/actions/check-r-package@v2
        env:
          # The install/test step above already bootstraps generated sedonafns
          # sources. Avoid running the same roxygen bootstrap again here, which
          # can crash Rscript on Windows while building the check tarball.
          R_SEDONADB_FNS_SKIP_BOOTSTRAP: "1"
        with:
          working-directory: r/sedonafns

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r/sdplyr
